<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deprem Sensör Sistemi</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #07111f;
  color: #f5f7fb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

.header {
  background: #0d1b2a;
  padding: 34px 16px 28px;
  text-align: center;
  font-size: 34px;
  font-weight: 800;
}

.container {
  padding: 22px 18px 40px;
}

.card {
  background: #14243a;
  border-radius: 24px;
  padding: 24px;
  margin-bottom: 22px;
}

.label {
  font-size: 26px;
  color: #ffffff;
  margin-bottom: 10px;
}

.value {
  font-size: 58px;
  font-weight: 900;
  color: #35ff8d;
  line-height: 1;
}

.status {
  margin-top: 12px;
  font-size: 26px;
}

button {
  width: 100%;
  border: none;
  border-radius: 22px;
  padding: 24px;
  background: #ff4650;
  color: white;
  font-size: 28px;
  font-weight: 800;
}

canvas {
  width: 100%;
  height: 210px;
  background: #020814;
  border-radius: 18px;
  display: block;
}

.section-title {
  font-size: 30px;
  font-weight: 800;
  margin-bottom: 18px;
}

.quake {
  font-size: 25px;
  margin-bottom: 20px;
  line-height: 1.35;
}

.quake small {
  display: block;
  color: #d6dbe6;
  font-size: 21px;
  margin-top: 3px;
}

.safe {
  color: #35ff8d;
}

.warn {
  color: #ffb02e;
}

.danger {
  color: #ff4d4d;
}

.footer-note {
  color: #aeb6c5;
  font-size: 15px;
  line-height: 1.5;
  padding: 0 4px;
}
</style>
</head>

<body>

<div class="header">Deprem Sensör Sistemi</div>

<div class="container">

  <div class="card">
    <div class="label">Anlık titreşim değeri</div>
    <div id="gvalue" class="value safe">0.00 g</div>
    <div id="status" class="status">Durum: Normal</div>
  </div>

  <div class="card">
    <button onclick="startSensor()">Sensörü Başlat</button>
  </div>

  <div class="card">
    <canvas id="chart" width="700" height="260"></canvas>
  </div>

  <div class="card">
    <div class="section-title">Son Depremler</div>
    <div id="quakeList">Yükleniyor...</div>
  </div>

  <div class="footer-note">
    Bu uygulama resmi erken uyarı sistemi değildir. Telefon sensörüyle titreşim ölçer ve yanlış alarm verebilir.
  </div>

</div>

<audio id="alarm">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>
const gvalue = document.getElementById("gvalue");
const statusText = document.getElementById("status");
const alarm = document.getElementById("alarm");

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

let data = [];
let lastAlarmTime = 0;

function drawChart(value) {
  data.push(value);
  if (data.length > 80) data.shift();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.beginPath();
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 1;

  for (let i = 1; i < 4; i++) {
    const y = i * canvas.height / 4;
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
  }
  ctx.stroke();

  ctx.beginPath();

  data.forEach((v, i) => {
    const x = i * (canvas.width / 80);
    const y = canvas.height - Math.min(v * 900, canvas.height - 8) - 4;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.strokeStyle = "#00ffe0";
  ctx.lineWidth = 5;
  ctx.stroke();
}

async function startSensor() {
  if (
    typeof DeviceMotionEvent !== "undefined" &&
    typeof DeviceMotionEvent.requestPermission === "function"
  ) {
    const permission = await DeviceMotionEvent.requestPermission();

    if (permission !== "granted") {
      alert("Sensör izni verilmedi.");
      return;
    }
  }

  window.addEventListener("devicemotion", handleMotion);
  alert("Sensör aktif. Telefonu sabit bir zemine koy.");
}

function handleMotion(event) {
  const a = event.accelerationIncludingGravity;
  if (!a) return;

  const x = a.x || 0;
  const y = a.y || 0;
  const z = a.z || 0;

  const total = Math.sqrt(x * x + y * y + z * z);
  const g = Math.abs(total - 9.81) / 9.81;

  updateStatus(g);
  drawChart(g);
}

function updateStatus(g) {
  gvalue.innerText = g.toFixed(2) + " g";

  if (g < 0.08) {
    gvalue.className = "value safe";
    statusText.innerText = "Durum: Normal";
  } else if (g < 0.25) {
    gvalue.className = "value warn";
    statusText.innerText = "Durum: Hafif titreşim";
  } else {
    gvalue.className = "value danger";
    statusText.innerText = "Durum: Güçlü sarsıntı!";

    const now = Date.now();
    if (now - lastAlarmTime > 5000) {
      alarm.play();
      if (navigator.vibrate) navigator.vibrate([400, 200, 400]);
      lastAlarmTime = now;
    }
  }
}

async function loadEarthquakes() {
  const list = document.getElementById("quakeList");

  try {
    const res = await fetch("https://sismikharita.com/api.php?min_magnitude=2.5&limit=20");
    const json = await res.json();

    list.innerHTML = "";

    json.earthquakes.forEach(q => {
      list.innerHTML += `
        <div class="quake">
          M${q.magnitude} - ${q.location}
          <small>${q.occurred_at} / ${q.depth_km} km</small>
        </div>
      `;
    });

  } catch (e) {
    list.innerHTML = "Deprem verisi alınamadı.";
  }
}

loadEarthquakes();
setInterval(loadEarthquakes, 60000);

drawChart(0.01);
</script>

</body>
</html>
